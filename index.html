*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── GLASS ── */
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12)}
.glass-strong{background:rgba(255,255,255,.09);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.17)}
.glass-dark{background:rgba(5,8,24,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.08)}
.glass-card{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.09);transition:all .3s cubic-bezier(.4,0,.2,1)}
.glass-card:hover{background:rgba(255,255,255,.09);border-color:rgba(6,182,212,.32);transform:translateY(-4px);box-shadow:0 20px 60px rgba(6,182,212,.09)}
.glass-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#e2e8f0;font-family:'DM Sans',sans-serif;transition:all .25s ease;outline:none}

select.glass-input option{background:#0f172a}

.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb-c{background:radial-gradient(circle,rgba(6,182,212,.22),transparent 70%)}

.car-img{transition:opacity .4s ease,transform .4s ease}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.animate-pulse{animation:pulse 2s ease-in-out infinite}

.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}

function Ico({ name, size=16, color='currentColor', sw=2 }) {
  const d = ICONS[name];
  if (!d) return null;
  const paths = Array.isArray(d) ? d : [d];
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
      {paths.map((p,i) => {
        if (p.startsWith('circle')) {
          const m = p.match(/cx=([\d.]+) cy=([\d.]+) r=([\d.]+)/);
          if (m) return <circle key={i} cx={m[1]} cy={m[2]} r={m[3]}/>;
        }
        if (p.startsWith('rect')) {
          const m = p.match(/x=([\d.]+) y=([\d.]+) width=([\d.]+) height=([\d.]+)(?: rx=([\d.]+))?/);
          if (m) return <rect key={i} x={m[1]} y={m[2]} width={m[3]} height={m[4]} rx={m[5]||0}/>;
        }
        if (p.startsWith('line')) {
          const m = p.match(/x1=([\d.]+) y1=([\d.]+) x2=([\d.]+) y2=([\d.]+)/);
          if (m) return <line key={i} x1={m[1]} y1={m[2]} x2={m[3]} y2={m[4]}/>;
        }
        if (p.startsWith('polyline')) {
          const m = p.match(/points=([^/]+)/);
          if (m) return <polyline key={i} points={m[1]}/>;
        }
        if (p.startsWith('polygon')) {
          const m = p.match(/points=([^/]+)/);
          if (m) return <polygon key={i} points={m[1]}/>;
        }
        return <path key={i} d={p}/>;
      })}
    </svg>
  );
}

function Navbar({ onLogout, onMembership, onSection }) {
  const [scrolled, setScrolled] = useState(false);
  const [mob, setMob] = useState(false);
  const [active, setActive] = useState('home');

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    const ids = ['home','about','events','team','notices','contact'];
    const obs = ids.map(id => {
      const el = document.getElementById(id);
      if (!el) return null;
      const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setActive(id); }, { threshold:.3 });
      o.observe(el);
      return o;
    });
    return () => { window.removeEventListener('scroll', onScroll); obs.forEach(o=>o?.disconnect()); };
  }, []);

  const go = (id) => { document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); setMob(false); };

  const links = ['Home','About','Events','Team','Notices','Contact'];

  return (
    <>
      <nav id="navbar" className={scrolled?'scrolled':''} style={{background: scrolled ? undefined : 'transparent'}}>
        <div className="inner" style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:64}}>

/* ═══════════════════════════════════════════════════
   PHOTO CAROUSEL
═══════════════════════════════════════════════════ */
function PhotoCarousel() {
  const [cur, setCur] = useState(0);
  const [fading, setFading] = useState(false);

  const go = useCallback((idx) => {
    if (fading) return;
    setFading(true);
    setTimeout(() => { setCur((idx + CAROUSEL.length) % CAROUSEL.length); setFading(false); }, 350);
  }, [fading]);

  useEffect(() => { const t = setInterval(() => go(cur+1), 5000); return ()=>clearInterval(t); }, [cur, go]);

  return (
    <div style={{position:'relative',borderRadius:20,overflow:'hidden',height:400,background:'#0f172a'}}>
      <img src={CAROUSEL[cur].url} alt={CAROUSEL[cur].cap}
        style={{width:'100%',height:'100%',objectFit:'cover',opacity:fading?0:1,transition:'opacity .35s ease',transform:`scale(${fading?.97:1})`,transitionProperty:'opacity,transform'}}/>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.2) 50%,transparent 100%)'}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'24px'}}>
        <div className="glass-dark" style={{display:'inline-block',borderRadius:14,padding:'12px 18px',maxWidth:340}}>
          <p style={{fontFamily:'Outfit',fontWeight:700,fontSize:'1.05rem',color:'#fff',marginBottom:3}}>{CAROUSEL[cur].cap}</p>
          <p style={{fontSize:'.82rem',color:'#94a3b8',fontWeight:300}}>{CAROUSEL[cur].sub}</p>
        </div>
      </div>
      {/* Arrows */}
      {[{dir:-1,side:'left'},{dir:1,side:'right'}].map(({dir,side})=>(
        <button key={side} onClick={()=>go(cur+dir)} className="glass" style={{position:'absolute',top:'50%',transform:'translateY(-50%)',[side]:14,width:38,height:38,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',cursor:'pointer',border:'1px solid rgba(255,255,255,.18)',background:'rgba(255,255,255,.1)'}}>
          <Ico name={dir===-1?'chevL':'chevR'} size={16}/>
        </button>
      ))}
      {/* Dots */}
      <div style={{position:'absolute',bottom:14,left:'50%',transform:'translateX(-50%)',display:'flex',gap:6,zIndex:5}}>
        {CAROUSEL.map((_,i)=>(
          <button key={i} onClick={()=>go(i)} style={{borderRadius:9999,border:'none',cursor:'pointer',transition:'all .3s',background:i===cur?'#22d3ee':'rgba(255,255,255,.35)',width:i===cur?20:7,height:7}}/>
        ))}
      </div>
    </div>
  );
}

              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

      </div>
      <div style={{textAlign:'center',padding:'16px',position:'relative',zIndex:5}}>

}

    </div>

}

/* ═══════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════ */
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [page, setPage] = useState('home');

  if (!loggedIn) return <LandingPage onLogin={()=>{setLoggedIn(true);setPage('home');}}/>;
  if (page==='membership') return <MembershipPage onBack={()=>setPage('home')} onLogout={()=>{setLoggedIn(false);setPage('home');}}/>;
  return <HomePage onLogout={()=>{setLoggedIn(false);setPage('home');}} onMembership={()=>setPage('membership')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
